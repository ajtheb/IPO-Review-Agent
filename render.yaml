services:
  - type: web
    name: ipo-review-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
